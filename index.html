<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Mi Compra Pro">
    <meta name="theme-color" content="#10b981">
    <title>Lista de la Compra Pro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        .fade-in { animation: fadeIn 0.25s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .line-through-animate { position: relative; }
        .line-through-animate::after {
            content: ''; position: absolute; left: 0; top: 50%; height: 2px; width: 100%;
            background-color: #9ca3af; animation: strike 0.2s ease-out forwards;
        }
        @keyframes strike { from { width: 0; } to { width: 100%; } }
    </style>
</head>
<body class="bg-gray-200 flex items-center justify-center min-h-screen font-sans antialiased text-gray-800">

    <main id="app-container" class="w-full h-screen sm:h-[800px] sm:max-w-md bg-gray-50 flex flex-col relative sm:rounded-[2.5rem] sm:border-[8px] border-gray-900 shadow-2xl overflow-hidden">
        
        <!-- VISTA 0: SELECCIÓN / GESTIÓN DE USUARIO -->
        <div id="view-user-select" class="flex flex-col h-full hidden fade-in">
            <header class="bg-emerald-500 text-white p-6 pt-12 pb-8 shadow-md rounded-b-3xl text-center">
                <h1 class="text-3xl font-bold tracking-tight">Perfiles</h1>
                <p class="text-emerald-100 mt-1">Selecciona, edita o elimina usuarios</p>
            </header>
            
            <div class="flex-1 overflow-y-auto p-6 space-y-4">
                <div id="users-list" class="space-y-3">
                    <!-- Lista de usuarios dinámicos -->
                </div>
                
                <div class="border-t border-gray-200 pt-4 mt-4">
                    <p class="text-sm font-semibold text-gray-500 mb-2">Crear nuevo usuario:</p>
                    <div class="flex gap-2">
                        <input type="text" id="new-user-input" placeholder="Nombre..." class="flex-1 bg-white border border-gray-300 rounded-xl px-4 py-3 text-lg focus:outline-none focus:ring-2 focus:ring-emerald-500" onkeypress="if(event.key === 'Enter') app.createUser()">
                        <button onclick="app.createUser()" class="bg-emerald-500 text-white px-5 rounded-xl font-bold active:scale-95 transition-all">Crear</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- VISTA 1: INICIO (Listas e Historial) -->
        <div id="view-home" class="flex flex-col h-full hidden">
            <header class="bg-emerald-500 text-white p-5 pt-12 pb-4 shadow-md rounded-b-3xl z-10">
                <div class="flex justify-between items-center mb-4">
                    <div class="flex-1 min-w-0 pr-4">
                        <span class="text-xs text-emerald-100 block">Usuario activo</span>
                        <h1 id="current-user-badge" class="text-2xl font-bold truncate">...</h1>
                    </div>
                    <button onclick="app.logoutUser()" class="bg-emerald-600 hover:bg-emerald-700 text-xs px-3 py-2 rounded-xl transition-colors font-medium flex-shrink-0">
                        Cambiar perfil
                    </button>
                </div>
                
                <div class="flex bg-emerald-600 p-1 rounded-xl text-sm font-semibold mt-2">
                    <button id="tab-btn-lists" onclick="app.switchTab('lists')" class="flex-1 text-center py-2.5 rounded-lg bg-white text-emerald-600 transition-all">Listas</button>
                    <button id="tab-btn-history" onclick="app.switchTab('history')" class="flex-1 text-center py-2.5 rounded-lg text-emerald-100 transition-all">Historial</button>
                </div>
            </header>

            <div id="tab-content-lists" class="flex-1 overflow-y-auto p-4 space-y-3 pb-24"></div>
            <div id="tab-content-history" class="flex-1 overflow-y-auto p-4 space-y-3 pb-24 hidden"></div>

            <button id="floating-add-btn" onclick="app.createNewTemplate()" class="absolute bottom-6 right-6 w-16 h-16 bg-emerald-500 text-white rounded-full shadow-lg flex items-center justify-center text-3xl hover:bg-emerald-600 active:scale-95 transition-transform z-20">
                +
            </button>
        </div>

        <!-- VISTA 2: DETALLE / EDICIÓN DE PLANTILLA -->
        <div id="view-template" class="flex flex-col h-full hidden fade-in">
            <header class="bg-white p-4 pt-12 shadow-sm z-10 flex items-center gap-3 border-b border-gray-200">
                <button onclick="app.navigate('home')" class="p-2 text-gray-500 hover:bg-gray-100 rounded-full active:bg-gray-200 transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                </button>
                <div class="flex-1 min-w-0">
                    <input type="text" id="template-name-input" class="text-2xl font-bold bg-transparent border-none focus:outline-none focus:ring-0 w-full truncate" placeholder="Nombre..." onchange="app.updateTemplateName(this.value)">
                    <p id="template-author-badge" class="text-xs text-gray-400 font-medium px-1 mt-0.5">Creado por: ...</p>
                </div>
                <button id="delete-template-btn" onclick="app.deleteCurrentTemplate()" class="p-2 text-red-500 hover:bg-red-50 rounded-full active:bg-red-100 transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                </button>
            </header>
            
            <div id="privacy-selector-zone" class="p-4 bg-gray-100 border-b border-gray-200 flex items-center justify-between">
                <span class="text-sm font-bold text-gray-600 uppercase tracking-wide">Privacidad</span>
                <div class="flex bg-gray-200 p-1 rounded-xl text-xs font-semibold">
                    <button id="btn-priv-public" onclick="app.updateTemplatePrivacy(false)" class="px-4 py-2 rounded-lg transition-all">Pública</button>
                    <button id="btn-priv-private" onclick="app.updateTemplatePrivacy(true)" class="px-4 py-2 rounded-lg transition-all">Privada</button>
                </div>
            </div>

            <div id="readonly-warning" class="p-3 bg-amber-50 text-amber-700 text-sm font-medium border-b border-amber-100 text-center hidden">
                🔒 Lista Privada. Puedes verla y usarla, pero no modificarla.
            </div>

            <div id="add-item-zone" class="p-4 bg-white border-b border-gray-100 flex gap-2">
                <input type="text" id="new-item-input" placeholder="Añadir artículo..." class="flex-1 bg-gray-100 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-emerald-500 text-lg" onkeypress="if(event.key === 'Enter') app.addItemToTemplate()">
                <button onclick="app.addItemToTemplate()" class="bg-emerald-500 text-white px-5 rounded-xl font-semibold hover:bg-emerald-600 active:scale-95 transition-all">Añadir</button>
            </div>

            <div id="template-items-list" class="flex-1 overflow-y-auto p-4 space-y-2 pb-24"></div>

            <div class="absolute bottom-0 w-full p-4 bg-gradient-to-t from-gray-50 via-gray-50 to-transparent pt-8 z-10">
                <button onclick="app.startShoppingSession()" class="w-full bg-emerald-500 text-white rounded-2xl py-4 text-xl font-bold shadow-lg hover:bg-emerald-600 active:scale-95 transition-transform flex items-center justify-center gap-2">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                    Empezar Sesión de Compra
                </button>
            </div>
        </div>

        <!-- VISTA 3: SESIÓN DE COMPRA ACTIVA -->
        <div id="view-session" class="flex flex-col h-full hidden fade-in bg-gray-50">
            <header class="bg-emerald-600 text-white p-4 pt-12 shadow-md z-10 flex items-center justify-between">
                <div>
                    <h2 class="text-sm font-medium text-emerald-200">Comprando</h2>
                    <h1 id="session-title" class="text-2xl font-bold truncate">...</h1>
                </div>
                <button onclick="app.cancelSession()" class="text-emerald-100 hover:text-white px-3 py-1 rounded-lg hover:bg-emerald-500 transition-colors text-sm font-medium">
                    Cancelar
                </button>
            </header>

            <div class="flex-1 overflow-y-auto pb-24">
                <div class="p-4">
                    <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3">Por Coger (<span id="pending-count">0</span>)</h3>
                    <div id="session-pending-list" class="space-y-2 bg-white rounded-2xl p-2 shadow-sm border border-gray-100"></div>
                </div>

                <div class="p-4 pt-0">
                    <details class="group" open>
                        <summary class="flex justify-between items-center font-medium cursor-pointer list-none text-xs text-gray-400 uppercase tracking-wider mb-3">
                            <span>En el carrito (<span id="bought-count">0</span>)</span>
                            <span class="transition group-open:rotate-180">
                                <svg fill="none" height="16" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="16"><polyline points="6 9 12 15 18 9"/></svg>
                            </span>
                        </summary>
                        <div id="session-bought-list" class="space-y-2 mt-2 opacity-60"></div>
                    </details>
                </div>
            </div>

            <div class="absolute bottom-0 w-full p-4 bg-white border-t border-gray-200 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)]">
                <button onclick="app.finishSession()" class="w-full bg-emerald-500 text-white rounded-2xl py-4 text-xl font-bold hover:bg-emerald-600 active:scale-95 transition-transform">
                    Finalizar y Registrar
                </button>
            </div>
        </div>
    </main>

    <script>
        const app = {
            data: {
                users: [],
                currentUser: null,
                templates: [],
                history: [],
                activeSession: null
            },
            state: {
                currentView: 'user-select',
                currentTab: 'lists',
                currentTemplateId: null
            },

            init() {
                this.loadData();

                if (this.data.activeSession) {
                    this.navigate('session');
                } else if (this.data.currentUser) {
                    this.navigate('home');
                } else {
                    this.navigate('user-select');
                }
            },

            loadData() {
                // He cambiado la clave a '_final' para asegurar que empiece de cero y deseche los datos mock antiguos.
                const saved = localStorage.getItem('grocery_pro_data_final');
                if (saved) this.data = JSON.parse(saved);
            },

            saveData() {
                localStorage.setItem('grocery_pro_data_final', JSON.stringify(this.data));
            },

            generateId() {
                return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
            },

            navigate(view) {
                ['user-select', 'home', 'template', 'session'].forEach(v => {
                    document.getElementById(`view-${v}`).classList.add('hidden');
                });
                document.getElementById(`view-${view}`).classList.remove('hidden');
                this.state.currentView = view;

                if (view === 'user-select') this.renderUserSelect();
                if (view === 'home') this.renderHome();
                if (view === 'template') this.renderTemplate();
                if (view === 'session') this.renderSession();
            },

            // === GESTIÓN DE USUARIOS ===
            renderUserSelect() {
                const container = document.getElementById('users-list');
                container.innerHTML = '';
                
                if (this.data.users.length === 0) {
                    container.innerHTML = `<p class="text-center text-gray-400 p-4">Aún no hay ningún perfil creado. Añade tu nombre abajo para empezar.</p>`;
                }

                this.data.users.forEach(user => {
                    const el = document.createElement('div');
                    el.className = 'flex items-center justify-between bg-white border border-gray-200 rounded-2xl p-2 shadow-sm';
                    el.innerHTML = `
                        <button onclick="app.loginUser('${user.id}')" class="flex-1 text-left p-3 active:bg-gray-50 rounded-xl transition-colors">
                            <span class="text-xl font-bold text-gray-700">${user.name}</span>
                            <span class="text-emerald-500 text-xs font-bold block mt-1 uppercase tracking-wide">Entrar</span>
                        </button>
                        <div class="flex gap-1 pr-2">
                            <button onclick="app.editUser('${user.id}')" class="p-3 text-gray-400 hover:text-blue-500 bg-gray-50 hover:bg-blue-50 rounded-xl transition-colors" title="Editar Nombre">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                            </button>
                            <button onclick="app.deleteUser('${user.id}')" class="p-3 text-gray-400 hover:text-red-500 bg-gray-50 hover:bg-red-50 rounded-xl transition-colors" title="Eliminar Usuario">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </div>
                    `;
                    container.appendChild(el);
                });
            },

            loginUser(id) {
                const user = this.data.users.find(u => u.id === id);
                if (user) {
                    this.data.currentUser = user;
                    this.saveData();
                    this.navigate('home');
                }
            },

            createUser() {
                const input = document.getElementById('new-user-input');
                const name = input.value.trim();
                if (!name) return alert('Introduce un nombre válido');

                const newUser = { id: this.generateId(), name: name };
                this.data.users.push(newUser);
                this.data.currentUser = newUser;
                this.saveData();
                
                input.value = '';
                this.navigate('home');
            },

            editUser(id) {
                const user = this.data.users.find(u => u.id === id);
                if (!user) return;
                
                const newName = prompt('Editar nombre de usuario:', user.name);
                if (newName && newName.trim() !== '') {
                    const finalName = newName.trim();
                    user.name = finalName;
                    
                    if (this.data.currentUser && this.data.currentUser.id === id) {
                        this.data.currentUser.name = finalName;
                    }
                    
                    this.data.templates.forEach(t => {
                        if (t.ownerId === id) t.ownerName = finalName;
                    });
                    
                    this.saveData();
                    this.renderUserSelect();
                }
            },

            deleteUser(id) {
                const user = this.data.users.find(u => u.id === id);
                if (!user) return;
                
                if (confirm(`¿Seguro que quieres eliminar a "${user.name}"?\n¡Atención! Todas sus listas PRIVADAS serán eliminadas permanentemente. Sus listas públicas se mantendrán para el resto de usuarios.`)) {
                    
                    this.data.users = this.data.users.filter(u => u.id !== id);
                    this.data.templates = this.data.templates.filter(t => {
                        return t.ownerId !== id || !t.isPrivate;
                    });
                    
                    if (this.data.currentUser && this.data.currentUser.id === id) {
                        this.data.currentUser = null;
                    }
                    
                    this.saveData();
                    this.renderUserSelect();
                }
            },

            logoutUser() {
                this.data.currentUser = null;
                this.saveData();
                this.navigate('user-select');
            },

            // === VISTA DE INICIO (TABS) ===
            switchTab(tab) {
                this.state.currentTab = tab;
                const btnLists = document.getElementById('tab-btn-lists');
                const btnHistory = document.getElementById('tab-btn-history');
                const contentLists = document.getElementById('tab-content-lists');
                const contentHistory = document.getElementById('tab-content-history');
                const floatBtn = document.getElementById('floating-add-btn');

                if (tab === 'lists') {
                    btnLists.className = "flex-1 text-center py-2.5 rounded-lg bg-white text-emerald-600 transition-all";
                    btnHistory.className = "flex-1 text-center py-2.5 rounded-lg text-emerald-100 transition-all";
                    contentLists.classList.remove('hidden');
                    contentHistory.classList.add('hidden');
                    floatBtn.classList.remove('hidden');
                    this.renderTemplatesList();
                } else {
                    btnHistory.className = "flex-1 text-center py-2.5 rounded-lg bg-white text-emerald-600 transition-all";
                    btnLists.className = "flex-1 text-center py-2.5 rounded-lg text-emerald-100 transition-all";
                    contentLists.classList.add('hidden');
                    contentHistory.classList.remove('hidden');
                    floatBtn.classList.add('hidden');
                    this.renderHistoryList();
                }
            },

            renderHome() {
                if(!this.data.currentUser) return this.navigate('user-select');
                document.getElementById('current-user-badge').innerText = this.data.currentUser.name;
                this.switchTab(this.state.currentTab);
            },

            renderTemplatesList() {
                const container = document.getElementById('tab-content-lists');
                container.innerHTML = '';

                if (this.data.templates.length === 0) {
                    container.innerHTML = `<p class="text-center text-gray-400 mt-12 p-4">No hay listas creadas. ¡Pulsa el botón + para estrenar la app!</p>`;
                    return;
                }

                this.data.templates.forEach(t => {
                    const el = document.createElement('div');
                    el.className = 'bg-white rounded-2xl p-5 shadow-sm border border-gray-100 cursor-pointer active:scale-[0.98] transition-transform flex justify-between items-center';
                    el.onclick = () => {
                        this.state.currentTemplateId = t.id;
                        this.navigate('template');
                    };

                    const isOwner = t.ownerId === this.data.currentUser.id;
                    const privacyBadge = t.isPrivate 
                        ? `<span class="bg-red-50 text-red-600 border border-red-100 text-[10px] px-2 py-0.5 rounded-md font-bold uppercase">🔒 Privada</span>`
                        : `<span class="bg-blue-50 text-blue-600 border border-blue-100 text-[10px] px-2 py-0.5 rounded-md font-bold uppercase">🌍 Pública</span>`;

                    el.innerHTML = `
                        <div class="space-y-1 min-w-0 flex-1 pr-2">
                            <div class="flex items-center gap-2 flex-wrap">
                                <h2 class="text-xl font-bold text-gray-800 truncate">${t.name}</h2>
                                ${privacyBadge}
                            </div>
                            <p class="text-xs text-gray-400">Por: ${isOwner ? 'Ti' : t.ownerName}</p>
                            <p class="text-sm text-gray-500 font-medium">${t.items.length} artículos</p>
                        </div>
                        <div class="text-emerald-500 bg-emerald-50 w-12 h-12 flex items-center justify-center rounded-full flex-shrink-0 font-bold text-xl">
                            ${(t.isPrivate && !isOwner) ? '👁️' : '⚙️'}
                        </div>
                    `;
                    container.appendChild(el);
                });
            },

            // === GESTIÓN DEL HISTORIAL ===
            renderHistoryList() {
                const container = document.getElementById('tab-content-history');
                container.innerHTML = '';

                if (this.data.history.length === 0) {
                    container.innerHTML = `<p class="text-center text-gray-400 mt-12 p-4">Aún no se ha completado ninguna compra en la app.</p>`;
                    return;
                }

                const header = document.createElement('div');
                header.className = 'flex justify-between items-center mb-4 px-1';
                header.innerHTML = `
                    <span class="text-sm font-bold text-gray-500 uppercase">Registros (${this.data.history.length})</span>
                    <button onclick="app.clearHistory()" class="text-xs text-red-500 hover:text-red-700 font-bold bg-red-50 hover:bg-red-100 px-3 py-1.5 rounded-lg transition-colors">
                        Vaciar Historial
                    </button>
                `;
                container.appendChild(header);

                this.data.history.forEach(h => {
                    const el = document.createElement('div');
                    el.className = 'bg-white rounded-2xl p-4 border border-gray-100 shadow-sm flex flex-col gap-1 relative';
                    
                    el.innerHTML = `
                        <div class="flex justify-between items-start pr-8">
                            <h3 class="font-bold text-gray-800 text-lg truncate">${h.templateName}</h3>
                            <span class="text-xs bg-gray-100 text-gray-500 font-semibold px-2 py-1 rounded-lg">${h.date}</span>
                        </div>
                        <div class="flex justify-between items-center mt-2 text-sm">
                            <span class="text-gray-600">Por: <strong class="text-gray-800">${h.buyerName}</strong></span>
                            <span class="bg-emerald-50 text-emerald-700 font-bold px-3 py-1 rounded-full text-xs">
                                ${h.boughtItems}/${h.totalItems} art.
                            </span>
                        </div>
                        <button onclick="app.deleteHistoryItem('${h.id}')" class="absolute top-3 right-3 text-gray-300 hover:text-red-500 p-1.5 rounded-lg active:bg-red-50 transition-colors" title="Borrar registro">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    `;
                    container.appendChild(el);
                });
            },

            deleteHistoryItem(id) {
                if (confirm('¿Seguro que deseas eliminar este registro del historial?')) {
                    this.data.history = this.data.history.filter(h => h.id !== id);
                    this.saveData();
                    this.renderHistoryList();
                }
            },

            clearHistory() {
                if (confirm('¿Estás absolutamente seguro de que quieres vaciar TODO el historial público de compras? Esta acción no se puede deshacer.')) {
                    this.data.history = [];
                    this.saveData();
                    this.renderHistoryList();
                }
            },

            createNewTemplate() {
                const newId = this.generateId();
                this.data.templates.unshift({
                    id: newId,
                    name: 'Nueva Lista',
                    ownerId: this.data.currentUser.id,
                    ownerName: this.data.currentUser.name,
                    isPrivate: false,
                    items: []
                });
                this.saveData();
                this.state.currentTemplateId = newId;
                this.navigate('template');
            },

            // === EDICIÓN / GESTIÓN DE PLANTILLAS ===
            renderTemplate() {
                const t = this.data.templates.find(x => x.id === this.state.currentTemplateId);
                if (!t) return this.navigate('home');

                const isOwner = t.ownerId === this.data.currentUser.id;
                const canModify = !t.isPrivate || isOwner; 

                const nameInput = document.getElementById('template-name-input');
                nameInput.value = t.name;
                nameInput.disabled = !canModify;
                
                document.getElementById('template-author-badge').innerText = `Creada por: ${isOwner ? 'Ti (Dueño)' : t.ownerName}`;
                
                const privZone = document.getElementById('privacy-selector-zone');
                if (isOwner) {
                    privZone.classList.remove('hidden');
                    const btnPub = document.getElementById('btn-priv-public');
                    const btnPriv = document.getElementById('btn-priv-private');
                    if (t.isPrivate) {
                        btnPub.className = "px-4 py-2 rounded-lg text-gray-500 hover:text-gray-700";
                        btnPriv.className = "px-4 py-2 rounded-lg bg-red-500 text-white shadow-sm";
                    } else {
                        btnPub.className = "px-4 py-2 rounded-lg bg-emerald-500 text-white shadow-sm";
                        btnPriv.className = "px-4 py-2 rounded-lg text-gray-500 hover:text-gray-700";
                    }
                } else {
                    privZone.classList.add('hidden');
                }

                const warning = document.getElementById('readonly-warning');
                const addZone = document.getElementById('add-item-zone');
                const deleteBtn = document.getElementById('delete-template-btn');

                if (!canModify) {
                    warning.classList.remove('hidden');
                    addZone.classList.add('hidden');
                    deleteBtn.classList.add('hidden');
                } else {
                    warning.classList.add('hidden');
                    addZone.classList.remove('hidden');
                    deleteBtn.classList.remove('hidden');
                }

                const list = document.getElementById('template-items-list');
                list.innerHTML = '';

                if (t.items.length === 0) {
                    list.innerHTML = `<p class="text-center text-gray-400 mt-8 py-2">La lista está vacía.</p>`;
                }

                t.items.forEach(item => {
                    const el = document.createElement('div');
                    el.className = 'flex justify-between items-center bg-gray-100 p-3.5 rounded-xl border border-gray-200/60';
                    el.innerHTML = `
                        <span class="text-lg text-gray-700 font-medium ml-2">${item.text}</span>
                        ${canModify ? `
                        <button onclick="app.deleteItemFromTemplate('${item.id}')" class="text-gray-400 hover:text-red-500 p-2 rounded-lg active:bg-red-50 transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                        ` : ''}
                    `;
                    list.appendChild(el);
                });
            },

            updateTemplateName(newName) {
                const t = this.data.templates.find(x => x.id === this.state.currentTemplateId);
                if (t && (!t.isPrivate || t.ownerId === this.data.currentUser.id)) {
                    t.name = newName.trim() || 'Lista Sin Nombre';
                    this.saveData();
                }
            },

            updateTemplatePrivacy(isPrivate) {
                const t = this.data.templates.find(x => x.id === this.state.currentTemplateId);
                if (t && t.ownerId === this.data.currentUser.id) {
                    t.isPrivate = isPrivate;
                    this.saveData();
                    this.renderTemplate();
                }
            },

            addItemToTemplate() {
                const input = document.getElementById('new-item-input');
                const text = input.value.trim();
                if (!text) return;

                const t = this.data.templates.find(x => x.id === this.state.currentTemplateId);
                if (t) {
                    t.items.push({ id: this.generateId(), text: text });
                    this.saveData();
                    input.value = '';
                    this.renderTemplate();
                }
            },

            deleteItemFromTemplate(itemId) {
                const t = this.data.templates.find(x => x.id === this.state.currentTemplateId);
                if (t) {
                    t.items = t.items.filter(i => i.id !== itemId);
                    this.saveData();
                    this.renderTemplate();
                }
            },

            deleteCurrentTemplate() {
                if (confirm('¿Seguro que deseas eliminar por completo esta plantilla de lista?')) {
                    this.data.templates = this.data.templates.filter(x => x.id !== this.state.currentTemplateId);
                    this.saveData();
                    this.navigate('home');
                }
            },

            // === MODO: SESIÓN DE COMPRA ===
            startShoppingSession() {
                const t = this.data.templates.find(x => x.id === this.state.currentTemplateId);
                if (!t || t.items.length === 0) {
                    return alert('La lista debe contener al menos 1 artículo para iniciar la compra.');
                }

                this.data.activeSession = {
                    templateId: t.id,
                    name: t.name,
                    items: t.items.map(i => ({ ...i, checked: false }))
                };
                this.saveData();
                this.navigate('session');
            },

            renderSession() {
                const session = this.data.activeSession;
                if (!session) return this.navigate('home');

                document.getElementById('session-title').innerText = session.name;
                
                const pendingList = document.getElementById('session-pending-list');
                const boughtList = document.getElementById('session-bought-list');
                pendingList.innerHTML = '';
                boughtList.innerHTML = '';

                let pendingCount = 0;
                let boughtCount = 0;

                session.items.forEach(item => {
                    const el = document.createElement('div');
                    el.className = `flex items-center p-4 rounded-xl cursor-pointer active:scale-[0.98] transition-all ${item.checked ? 'bg-gray-100' : 'bg-white hover:bg-gray-50'}`;
                    el.onclick = () => this.toggleSessionItem(item.id);

                    const icon = item.checked 
                        ? `<svg class="w-7 h-7 text-emerald-500 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>`
                        : `<div class="w-7 h-7 border-2 border-gray-300 rounded-full flex-shrink-0 bg-white"></div>`;

                    el.innerHTML = `
                        <div class="mr-4 flex-shrink-0">${icon}</div>
                        <span class="text-xl font-medium ${item.checked ? 'text-gray-400 line-through-animate' : 'text-gray-800'}">${item.text}</span>
                    `;

                    if (item.checked) {
                        boughtList.appendChild(el);
                        boughtCount++;
                    } else {
                        pendingList.appendChild(el);
                        pendingCount++;
                    }
                });

                document.getElementById('pending-count').innerText = pendingCount;
                document.getElementById('bought-count').innerText = boughtCount;

                if (pendingCount === 0) {
                    pendingList.innerHTML = `<div class="text-center p-6 text-emerald-600 font-bold text-lg">¡Cesta completa! Ya puedes pasar por caja. 🛒🎉</div>`;
                }
                if (boughtCount === 0) {
                    boughtList.innerHTML = `<div class="text-center p-3 text-gray-400 text-sm">El carrito está vacío.</div>`;
                }
            },

            toggleSessionItem(itemId) {
                const item = this.data.activeSession.items.find(i => i.id === itemId);
                if (item) {
                    item.checked = !item.checked;
                    this.saveData();
                    setTimeout(() => this.renderSession(), 120);
                }
            },

            finishSession() {
                const session = this.data.activeSession;
                if (!session) return;

                const total = session.items.length;
                const totalBought = session.items.filter(i => i.checked).length;

                const now = new Date();
                const formattedDate = now.toLocaleDateString('es-ES', {day:'2-digit', month:'2-digit', year:'numeric'}) + ' ' + now.toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'});

                this.data.history.unshift({
                    id: this.generateId(),
                    date: formattedDate,
                    templateName: session.name,
                    buyerName: this.data.currentUser.name,
                    totalItems: total,
                    boughtItems: totalBought
                });

                this.data.activeSession = null;
                this.state.currentTab = 'history'; 
                this.saveData();
                this.navigate('home');
            },

            cancelSession() {
                if (confirm('¿Seguro que deseas cancelar la sesión? No se registrará en el historial público y perderás lo marcado.')) {
                    this.data.activeSession = null;
                    this.saveData();
                    this.navigate('home');
                }
            }
        };

        document.addEventListener('DOMContentLoaded', () => app.init());
    </script>
</body>
</html>
